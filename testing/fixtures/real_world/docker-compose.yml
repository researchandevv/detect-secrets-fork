      - REDIS_URL=redis://default:R3d1sP@ssw0rd@redis:6379/0
      - AWS_ACCESS_KEY_ID=AKIAI44QH8DHBEXAMP03
      - AWS_SECRET_ACCESS_KEY="nE7MtGbClwBF/2Zp9Utk/h3yCo8nvbEXAMPLEKEY"
