name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[word_list,gibberish]"
          pip install pytest pytest-cov responses coverage unidiff

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short -q 2>&1 | tail -50
          pytest tests/ --tb=short -q

      - name: Verify CLI entry point
        run: |
          detect-secrets --version
          detect-secrets scan --list-all-plugins

  test-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Run tests on ARM64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .github/workflows/Dockerfile.ci-arm64
          platforms: linux/arm64
          push: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy types-PyYAML types-requests

      - name: Run flake8
        run: flake8 detect_secrets/ --max-line-length=120 --count --show-source --statistics
